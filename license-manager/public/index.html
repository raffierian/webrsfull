<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RH Production - License Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 rounded-xl shadow-2xl w-full max-w-md p-8 border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400">License Generator</h1>
            <p class="text-gray-400 text-sm mt-1">RH Production Internal Tool</p>
        </div>

        <form id="licenseForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Developer Master Key</label>
                <input type="password" id="masterKey" required
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Enter your secret password">
            </div>

            <div class="h-px bg-gray-700 my-4"></div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Client Name</label>
                <input type="text" id="client" required
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="e.g. RS Soewandhie">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Expiry Date (Optional)</label>
                <input type="date" id="expiry"
                    class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <p class="text-xs text-gray-500 mt-1">Leave empty for PERMANENT license</p>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                Generate License Key
            </button>
        </form>

        <div id="resultArea" class="hidden mt-6">
            <label class="block text-sm font-medium text-green-400 mb-1">Generated License Key:</label>
            <div class="relative">
                <textarea id="licenseOutput" readonly
                    class="w-full bg-gray-900 border border-green-500/30 rounded-lg px-4 py-3 text-green-300 text-xs font-mono h-24 break-all focus:outline-none"></textarea>
                <button onclick="copyToClipboard()"
                    class="absolute top-2 right-2 bg-gray-700 hover:bg-gray-600 text-xs text-white px-2 py-1 rounded">
                    Copy
                </button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('licenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const masterKey = document.getElementById('masterKey').value;
            const client = document.getElementById('client').value;
            const expiry = document.getElementById('expiry').value;
            const resultArea = document.getElementById('resultArea');
            const output = document.getElementById('licenseOutput');

            try {
                const response = await fetch('api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ masterKey, client, expiry })
                });

                const data = await response.json();

                if (data.success) {
                    output.value = data.licenseKey;
                    resultArea.classList.remove('hidden');
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Connection error');
            }
        });

        function copyToClipboard() {
            const copyText = document.getElementById("licenseOutput");
            copyText.select();
            document.execCommand("copy");
            alert("Copied to clipboard!");
        }
    </script>
</body>

</html>
